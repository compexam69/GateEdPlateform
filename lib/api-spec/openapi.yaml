openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: EdTech Study Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: subjects
    description: Subject management
  - name: chapters
    description: Chapter management
  - name: topics
    description: Topic management
  - name: progress
    description: User progress tracking
  - name: exams
    description: Exam operations
  - name: notes
    description: PDF notes management
  - name: pomodoro
    description: Pomodoro timer
  - name: tasks
    description: Study tasks
  - name: tests
    description: External test tracker
  - name: admin
    description: Admin panel operations
  - name: storage
    description: B2 storage operations
  - name: dashboard
    description: Dashboard summary

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerifyInput"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid token

  # ── Dashboard ─────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get student dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Subjects ──────────────────────────────────────────────────────────
  /subjects:
    get:
      operationId: getSubjects
      tags: [subjects]
      summary: List all active subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{subjectId}:
    get:
      operationId: getSubject
      tags: [subjects]
      summary: Get subject by ID
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update a subject (admin only)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectUpdate"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject (admin only)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Chapters ──────────────────────────────────────────────────────────
  /subjects/{subjectId}/chapters:
    get:
      operationId: getChapters
      tags: [chapters]
      summary: List chapters for a subject
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"
    post:
      operationId: createChapter
      tags: [chapters]
      summary: Create a chapter (admin only)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"

  /chapters/{chapterId}:
    patch:
      operationId: updateChapter
      tags: [chapters]
      summary: Update a chapter (admin only)
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
    delete:
      operationId: deleteChapter
      tags: [chapters]
      summary: Delete a chapter (admin only)
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Topics ────────────────────────────────────────────────────────────
  /chapters/{chapterId}/topics:
    get:
      operationId: getTopics
      tags: [topics]
      summary: List topics for a chapter
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
    post:
      operationId: createTopic
      tags: [topics]
      summary: Create a topic (admin only)
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /topics/{topicId}:
    patch:
      operationId: updateTopic
      tags: [topics]
      summary: Update a topic (admin only)
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  # ── Progress (Gate Checker) ───────────────────────────────────────────
  /gate/check:
    post:
      operationId: checkGate
      tags: [progress]
      summary: Check if a gate/step is accessible for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateCheckInput"
      responses:
        "200":
          description: Gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateCheckResult"
        "403":
          description: Prerequisites not met

  /progress/topic/{topicId}:
    get:
      operationId: getTopicProgress
      tags: [progress]
      summary: Get user progress for a specific topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Topic progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicProgress"

  /progress/lecture-click:
    post:
      operationId: recordLectureClick
      tags: [progress]
      summary: Record that user clicked a lecture link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LectureClickInput"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Exams ─────────────────────────────────────────────────────────────
  /exam/start:
    post:
      operationId: startExam
      tags: [exams]
      summary: Start an exam attempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamStartInput"
      responses:
        "201":
          description: Exam started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamSession"
        "403":
          description: Prerequisite gate not met

  /exam/submit:
    post:
      operationId: submitExam
      tags: [exams]
      summary: Submit exam answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamSubmitInput"
      responses:
        "200":
          description: Submitted and scored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /exam/results/{resultId}:
    get:
      operationId: getExamResult
      tags: [exams]
      summary: Fetch exam result by ID
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /exam/history:
    get:
      operationId: getExamHistory
      tags: [exams]
      summary: Get user's exam attempt history
      responses:
        "200":
          description: Attempt history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamAttemptSummary"

  /quizzes/{quizId}/questions:
    get:
      operationId: getQuizQuestions
      tags: [exams]
      summary: Get questions for a quiz
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Questions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /quizzes:
    post:
      operationId: createQuiz
      tags: [exams]
      summary: Create a quiz (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "201":
          description: Created quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /questions:
    post:
      operationId: createQuestion
      tags: [exams]
      summary: Create a question (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/bulk-import:
    post:
      operationId: bulkImportQuestions
      tags: [exams]
      summary: Bulk import questions from JSON array (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkQuestionsInput"
      responses:
        "201":
          description: Questions imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  # ── QR Code ───────────────────────────────────────────────────────────
  /qr/generate:
    post:
      operationId: generateQr
      tags: [exams]
      summary: Generate QR code for a YouTube URL (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QrInput"
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrResult"

  # ── Notes / PDF ───────────────────────────────────────────────────────
  /notes:
    get:
      operationId: getNotes
      tags: [notes]
      summary: Get user's uploaded notes
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

  /notes/{noteId}:
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── B2 Storage ────────────────────────────────────────────────────────
  /b2/upload-url:
    post:
      operationId: getUploadUrl
      tags: [storage]
      summary: Get presigned B2 URL for PDF upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlInput"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResult"
        "403":
          description: Gate not unlocked or quota exceeded

  /b2/download-url:
    post:
      operationId: getDownloadUrl
      tags: [storage]
      summary: Get presigned B2 URL for PDF download
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadUrlInput"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlResult"

  /b2/profile-upload-url:
    post:
      operationId: getProfileUploadUrl
      tags: [storage]
      summary: Get presigned B2 URL for profile photo upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUploadInput"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResult"

  /b2/profile-download-url:
    post:
      operationId: getProfileDownloadUrl
      tags: [storage]
      summary: Get presigned B2 URL for profile photo download
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDownloadInput"
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlResult"

  /b2/quota:
    get:
      operationId: getStorageQuota
      tags: [storage]
      summary: Get user storage usage and quota
      responses:
        "200":
          description: Quota info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageQuota"

  # ── Pomodoro ─────────────────────────────────────────────────────────
  /pomodoro/sessions:
    get:
      operationId: getPomodoroSessions
      tags: [pomodoro]
      summary: Get user's pomodoro session history
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PomodoroSession"
    post:
      operationId: createPomodoroSession
      tags: [pomodoro]
      summary: Log a completed pomodoro session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PomodoroSessionInput"
      responses:
        "201":
          description: Session logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PomodoroSession"

  /pomodoro/stats:
    get:
      operationId: getPomodoroStats
      tags: [pomodoro]
      summary: Get today's focus time and streak info
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PomodoroStats"

  # ── Study Tasks ───────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get today's study tasks
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudyTask"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a manual study task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyTaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyTask"

  /tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task status or details
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudyTaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyTask"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── External Tests ────────────────────────────────────────────────────
  /external-tests:
    get:
      operationId: getExternalTests
      tags: [tests]
      summary: Get user's external test log
      responses:
        "200":
          description: External tests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalTest"
    post:
      operationId: createExternalTest
      tags: [tests]
      summary: Log an external test result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalTestInput"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalTest"

  /external-tests/{testId}:
    delete:
      operationId: deleteExternalTest
      tags: [tests]
      summary: Delete an external test entry
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Admin ─────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /admin/users/{userId}/approve:
    post:
      operationId: adminApproveUser
      tags: [admin]
      summary: Approve a pending user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{userId}/reject:
    post:
      operationId: adminRejectUser
      tags: [admin]
      summary: Reject / ban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{userId}/reset-progress:
    post:
      operationId: adminResetUserProgress
      tags: [admin]
      summary: Reset a user's progress (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetProgressInput"
      responses:
        "200":
          description: Progress reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin]
      summary: Get platform analytics overview (admin only)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"

  /admin/storage:
    get:
      operationId: adminGetStorageStats
      tags: [admin]
      summary: Get global B2 storage stats (admin only)
      responses:
        "200":
          description: Storage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStorageStats"

# ── Schemas ───────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    EmailVerifyInput:
      type: object
      properties:
        token:
          type: string
      required: [token]

    # ── User ─────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
        full_name:
          type: string
        mobile_number:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, admin, student]
        is_approved:
          type: boolean
        status:
          type: string
          enum: [active, suspended, pending_approval]
        email_verified:
          type: boolean
        avatar_url:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, full_name, email, role, is_approved, status, email_verified, created_at]

    # ── Dashboard ─────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        focus_streak_days:
          type: integer
        focus_time_today_minutes:
          type: integer
        total_topics_complete:
          type: integer
        total_topics:
          type: integer
        pending_tasks:
          type: integer
        recent_exam_score:
          type: ["number", "null"]
        subjects_progress:
          type: array
          items:
            $ref: "#/components/schemas/SubjectProgress"
      required: [focus_streak_days, focus_time_today_minutes, total_topics_complete, total_topics, pending_tasks, subjects_progress]

    SubjectProgress:
      type: object
      properties:
        subject_id:
          type: string
        subject_title:
          type: string
        chapters_complete:
          type: integer
        chapters_total:
          type: integer
        topics_complete:
          type: integer
        topics_total:
          type: integer
      required: [subject_id, subject_title, chapters_complete, chapters_total, topics_complete, topics_total]

    # ── Content ───────────────────────────────────────────────────────────
    Subject:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        order_index:
          type: integer
        icon_url:
          type: ["string", "null"]
        is_active:
          type: boolean
      required: [id, title, order_index, is_active]

    SubjectInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        order_index:
          type: integer
        icon_url:
          type: ["string", "null"]
        is_active:
          type: boolean
      required: [title, order_index]

    SubjectUpdate:
      type: object
      properties:
        title:
          type: string
        description:
